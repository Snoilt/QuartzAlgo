# .github/workflows/docker-build-push.yaml
name: Build & push QuartzAlgo image

on:
  push:
    branches: [v4]            # feuert bei jedem Commit auf v4
  workflow_dispatch:          # manueller Start im UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write         # erlaubt Push zu ghcr.io
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/snoilt/quartzalgo:latest   # <— fertiges Image-Tag
          cache-from: type=gha
          cache-to:   type=gha